<!DOCTYPE html>

<html lang="ptbr">

    <head>
        <title>Ex Sala - Aula 0</title>

        <style>
            body{
                font-family: 'Courier New', Courier, monospace;

            }

            .login{
                margin-left: 50px;
            }

            .hbartop{
                border: 0;
                height: 30px;
                background: linear-gradient(to bottom, #fcb421, #64c4d2 60%);
            }

            .hbar{
                border: 0;
                height: 3px;
                background: linear-gradient(to right, #1094ab, #64c4d2);
                margin-left: 0;
                width: 200px;
            }

            form > *{
                margin-top: 2px;
                margin-bottom: 2px;
            }

            form input{
                width: 190px;
            }

            form button{
                color: white;
                background-color: #1094ab;
                border-color: #64c4d2;

                border-radius: 8px;
            }

            form button:hover{
                color: black;
                background-color: #fcb421;
                border-color: black;
            }

            footer{
                text-align: center;
                font-size: 10px;
                margin-top: 100px;
            }

        </style>
    </head>


    <body>
        <img src="usp-logo.png">
        <img src="usp-logo-texto.png">

<hr class="hbartop">

        <div class="login">
        
            <h2>Login</h2>

            <hr class="hbar">
            <form>
                <input type="text" placeholder="Usuário">
                <br>
                <input type="password" placeholder="Senha">
                <br>
                <button>Entrar</button>
            </form>
            
            
            <hr class="hbar">
        </div>

    </body>

    <footer>

        <p><a href="https://uspdigital.usp.br/jupiterweb/creditos.jsp">Créditos</a> | <a href="https://uspdigital.usp.br/jupiterweb/jupColegiadoEmailLista">Fale conosco</a></p>
        <p>© 1999 - 2026 - Superintendência de Tecnologia da Informação/USP</p>

    </footer>

</html>
